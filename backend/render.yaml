# Example Render deployment for the Slate API.
# Adjust CORS_ORIGINS to your deployed frontend URL and set a strong SECRET_KEY.
services:
  - type: web
    name: slate-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: sqlite:////var/data/slate.db
    disk:
      name: slate-data
      mountPath: /var/data
      sizeGB: 1
